name: Daily Threat Intel Pipeline

on:
  schedule:
    - cron: '0 10 * * *'  # 4 AM Mountain Time (UTC-6) — primary run
    - cron: '0 16 * * *'  # 10 AM MT — catch-up run (idempotent: same date path,
                          # overwrites; covers API limits/outages in the 4 AM run)
  workflow_dispatch:       # allows manual trigger from GitHub UI

concurrency:
  group: threat-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          OTX_API_KEY:           ${{ secrets.OTX_API_KEY }}
          THREATFOX_API_KEY:     ${{ secrets.THREATFOX_API_KEY }}
          ABUSE_API_KEY:         ${{ secrets.ABUSE_API_KEY }}
          IPINFO_TOKEN:          ${{ secrets.IPINFO_TOKEN }}
          NVD_API_KEY:           ${{ secrets.NVD_API_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
        run: python threat_pipeline.py --quick

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: threat-log
          path: threat.log
          retention-days: 7

      - name: Notify on failure
        if: failure()
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          ALERT_EMAIL:   ${{ secrets.ALERT_EMAIL }}
        run: |
          if [ -n "$BREVO_API_KEY" ] && [ -n "$ALERT_EMAIL" ]; then
            curl -s -X POST 'https://api.brevo.com/v3/smtp/email' \
              -H "api-key: $BREVO_API_KEY" \
              -H 'Content-Type: application/json' \
              -d "{
                \"sender\": {\"name\": \"Komoto Pipeline\", \"email\": \"alerts@komotosecurity.com\"},
                \"to\": [{\"email\": \"$ALERT_EMAIL\"}],
                \"subject\": \"[ALERT] Threat pipeline failed — $(date -u +%Y-%m-%d)\",
                \"htmlContent\": \"<p>The daily threat intel pipeline failed at $(date -u).</p><p>Check the <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>workflow run</a> for details.</p><p>Last 20 lines of threat.log:</p><pre>$(tail -20 threat.log 2>/dev/null || echo 'No log file found')</pre>\"
              }"
            echo "Alert email sent to $ALERT_EMAIL"
          else
            echo "::warning::BREVO_API_KEY or ALERT_EMAIL not set — skipping failure alert"
          fi
